name: Bug Report
description: Report a bug in rxml
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        from rxml import read_file
        # ...
        ```

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include tracebacks if applicable).

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12.0"

  - type: input
    id: rxml-version
    attributes:
      label: rxml Version
      placeholder: "2.3.6"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
